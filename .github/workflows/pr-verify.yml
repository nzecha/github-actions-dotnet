name: PR Verify

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: PR Verify
    runs-on: ubuntu-latest

    steps:
      - name: checkoutV4
        uses: actions/checkout@v4

      - name: Set up .NET Cor
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0

      - name: Build with dotnet
        run: dotnet build --configuration Release
